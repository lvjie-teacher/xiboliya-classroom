<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🚂 透过西伯利亚大铁路看俄罗斯</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif; background: #f0f2f5; color: #333; line-height: 1.6; }
        .app-container { max-width: 100%; min-height: 100vh; display: flex; flex-direction: column; }

        /* ========== 小组选择 - 全新设计 ========== */
        .group-select-overlay { position: fixed; inset: 0; background: linear-gradient(160deg, #0d1b3e 0%, #1a237e 30%, #283593 60%, #1a237e 100%); z-index: 500; display: flex; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
        .group-select-overlay::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 0%, rgba(255,255,255,0.06) 0%, transparent 60%); pointer-events: none; }
        .group-select-overlay.hidden { display: none; }
        .group-select-box { background: rgba(255,255,255,0.97); border-radius: 24px; padding: 36px 28px 28px; max-width: 460px; width: 100%; text-align: center; box-shadow: 0 24px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.1); position: relative; animation: gsSlideUp 0.5s cubic-bezier(0.16,1,0.3,1); }
        @keyframes gsSlideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .gs-decor { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 8px; }
        .gs-decor-line { width: 40px; height: 3px; background: linear-gradient(90deg, transparent, #ff6f00, transparent); border-radius: 2px; }
        .group-select-box h2 { font-size: 20px; color: #1a237e; margin-bottom: 2px; letter-spacing: 0.5px; }
        .group-select-box .gs-subtitle { font-size: 13px; color: #999; margin-bottom: 28px; }
        .group-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-bottom: 24px; }
        .group-select-btn { padding: 22px 10px 16px; border: 2.5px solid #e8e8e8; border-radius: 16px; background: #fafafa; cursor: pointer; transition: all 0.3s cubic-bezier(0.16,1,0.3,1); text-align: center; position: relative; overflow: hidden; }
        .group-select-btn::after { content: ''; position: absolute; inset: 0; border-radius: 14px; opacity: 0; transition: opacity 0.3s; }
        .group-select-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); border-color: #bbb; }
        .group-select-btn:active { transform: translateY(0); }
        .group-select-btn .gs-icon { font-size: 42px; display: block; margin-bottom: 8px; transition: transform 0.3s; position: relative; z-index: 1; }
        .group-select-btn:hover .gs-icon { transform: scale(1.1); }
        .group-select-btn .gs-name { font-size: 15px; font-weight: 700; color: #333; position: relative; z-index: 1; }
        .group-select-btn .gs-hint { font-size: 11px; color: #aaa; margin-top: 2px; position: relative; z-index: 1; }
        /* 选中状态 */
        .group-select-btn[data-selected="true"] { border-color: var(--gs-color); background: var(--gs-bg); box-shadow: 0 0 0 4px var(--gs-ring); }
        .group-select-btn[data-selected="true"] .gs-name { color: var(--gs-color); }
        .group-number-row { display: flex; align-items: center; gap: 10px; margin-top: 0; justify-content: center; }
        .group-number-row label { font-size: 15px; color: #555; font-weight: 500; }
        .group-number-row input { width: 72px; padding: 12px 8px; border: 2px solid #ddd; border-radius: 12px; font-size: 18px; text-align: center; outline: none; font-weight: 700; transition: border-color 0.2s; }
        .group-number-row input:focus { border-color: #1a237e; box-shadow: 0 0 0 3px rgba(26,35,126,0.1); }
        .group-enter-btn { width: 100%; margin-top: 18px; padding: 16px; border: none; border-radius: 14px; background: linear-gradient(135deg, #283593, #1a237e); color: white; font-size: 17px; font-weight: 700; cursor: pointer; transition: all 0.3s; letter-spacing: 1px; box-shadow: 0 4px 16px rgba(26,35,126,0.3); }
        .group-enter-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(26,35,126,0.4); }
        .group-enter-btn:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }
        .app-header { background: linear-gradient(135deg, #1a237e, #283593); color: white; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.15); position: sticky; top: 0; z-index: 100; }
        .header-title { font-size: 17px; font-weight: 600; }
        .header-subtitle { font-size: 12px; opacity: 0.8; }
        .header-right { display: flex; align-items: center; gap: 8px; }
        .switch-group-btn { background: rgba(255,255,255,0.15); border: none; color: white; padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; }
        .exit-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; padding: 4px 8px; }

        .main-content { flex: 1; padding: 16px; overflow-y: auto; padding-bottom: 80px; }
        .step-indicator { background: white; border-radius: 12px; padding: 14px 16px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .step-list { display: flex; gap: 10px; flex-wrap: wrap; }
        .step-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #666; }
        .step-item.active { color: #1a237e; font-weight: 600; }
        .step-number { width: 22px; height: 22px; border-radius: 50%; background: #e0e0e0; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: white; }
        .step-item.active .step-number { background: #1a237e; }

        .group-card { background: white; border-radius: 12px; overflow: hidden; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .group-header { color: white; padding: 14px 20px; display: flex; align-items: center; gap: 10px; }
        .group-icon { font-size: 24px; }
        .group-name { font-size: 16px; font-weight: 600; }
        .group-body { padding: 20px; }
        .task-section { margin-bottom: 24px; animation: fadeIn 0.3s ease-out; }
        .task-title { display: flex; align-items: center; gap: 8px; font-size: 16px; font-weight: 600; color: #1a237e; margin-bottom: 12px; }
        .task-title .emoji { font-size: 20px; }
        .task-description { font-size: 14px; color: #555; margin-bottom: 12px; padding-left: 28px; }

        .upload-area { border: 2px dashed #c5cae9; border-radius: 12px; padding: 20px; text-align: center; background: #f5f5ff; cursor: pointer; transition: all 0.2s; margin-bottom: 12px; min-height: 80px; }
        .upload-area:hover { border-color: #1a237e; background: #eef0ff; }
        .upload-area .upload-icon { font-size: 36px; margin-bottom: 6px; }
        .upload-area .upload-text { font-size: 14px; color: #666; }
        .uploaded-thumbs { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
        .uploaded-thumbs img { height: 80px; object-fit: cover; border-radius: 6px; border: 2px solid #c5cae9; cursor: pointer; }
        .thumb-delete-btn { position: absolute; top: -6px; right: -6px; width: 22px; height: 22px; background: #ff5252; color: white; border: none; border-radius: 50%; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; padding: 0; }
        .thumb-delete-btn:hover { background: #d32f2f; transform: scale(1.15); }
        .upload-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
        .upload-btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px; border: 1px solid #c5cae9; border-radius: 8px; background: white; cursor: pointer; font-size: 14px; color: #1a237e; }
        .upload-btn:hover { background: #e8eaf6; }
        .upload-btn .btn-icon { font-size: 18px; }

        .answer-area { background: #fafafa; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
        .answer-label { font-size: 14px; font-weight: 600; color: #333; margin-bottom: 8px; }
        .answer-textarea { width: 100%; min-height: 70px; border: 1px solid #ddd; border-radius: 6px; padding: 10px 12px; font-size: 14px; font-family: inherit; resize: vertical; outline: none; }
        .answer-textarea:focus { border-color: #1a237e; }

        .region-analysis { display: flex; flex-direction: column; gap: 14px; margin-bottom: 16px; }
        .region-card { border-radius: 8px; padding: 14px; border-left: 4px solid; }
        .region-card.west { background: #e3f2fd; border-left-color: #1565c0; }
        .region-card.east { background: #ffebee; border-left-color: #c62828; }
        .region-label { font-size: 14px; font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .analysis-guide { border-radius: 12px; padding: 14px 16px; margin-bottom: 16px; border-left: 4px solid; }
        .analysis-guide.terrain { background: #efebe9; border-left-color: #795548; }
        .analysis-guide.climate { background: #fff3e0; border-left-color: #e65100; }
        .analysis-guide.river  { background: #e3f2fd; border-left-color: #1565c0; }
        .analysis-guide .ag-title { font-size: 14px; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .analysis-guide.terrain .ag-title { color: #4e342e; }
        .analysis-guide.climate .ag-title { color: #bf360c; }
        .analysis-guide.river  .ag-title { color: #0d47a1; }
        .analysis-guide .ag-steps { padding-left: 0; list-style: none; counter-reset: step; margin: 0; }
        .analysis-guide .ag-steps li { font-size: 13px; color: #444; padding: 3px 0 3px 22px; position: relative; line-height: 1.6; }
        .analysis-guide .ag-steps li::before { counter-increment: step; content: counter(step); position: absolute; left: 0; top: 3px; width: 18px; height: 18px; border-radius: 50%; background: #999; color: white; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
        .analysis-guide.terrain .ag-steps li::before { background: #795548; }
        .analysis-guide.climate .ag-steps li::before { background: #e65100; }
        .analysis-guide.river  .ag-steps li::before { background: #1565c0; }
        .analysis-guide .ag-steps li strong { color: #1a237e; }
        .analysis-guide .ag-note { font-size: 12px; color: #888; margin-top: 8px; padding: 6px 8px; background: rgba(255,255,255,0.6); border-radius: 6px; }
        .tip-box strong { color: #e65100; }
        .conclusion-section { background: #f3e5f5; border-radius: 8px; padding: 16px; margin-bottom: 16px; border-left: 4px solid #7b1fa2; }
        .conclusion-label { font-size: 15px; font-weight: 600; color: #4a148c; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }

        .search-buttons { display: flex; gap: 10px; margin-bottom: 16px; }
        .search-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 14px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; }
        .search-btn.image { background: linear-gradient(135deg, #42a5f5, #1e88e5); color: white; }
        .search-btn.image:hover { opacity: 0.9; }
        .search-btn .btn-icon { font-size: 18px; }
        .search-guide { background: #e8eaf6; border-radius: 8px; padding: 14px; margin-bottom: 16px; }
        .search-guide-title { font-size: 14px; font-weight: 600; color: #1a237e; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
        .search-guide ol { padding-left: 20px; font-size: 13px; color: #444; margin-bottom: 10px; }
        .search-guide ol li { margin-bottom: 4px; }
        .search-guide strong { color: #c62828; }
        .search-links { display: flex; gap: 10px; margin-bottom: 14px; }
        .search-link-btn { flex: 1; display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px; background: white; border: 1px solid #c5cae9; border-radius: 8px; text-decoration: none; color: #1a237e; font-size: 13px; font-weight: 500; }
        .search-link-btn:hover { background: #c5cae9; }
        .search-upload-btns { display: flex; gap: 10px; }
        .search-upload-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px; border: 1px solid #c5cae9; border-radius: 8px; background: white; cursor: pointer; font-size: 13px; color: #1a237e; }
        .search-upload-btn:hover { background: #e8eaf6; }

        .achievement-wall { background: white; border-radius: 12px; overflow: hidden; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .achievement-header { background: linear-gradient(135deg, #ff6f00, #ff8f00); color: white; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
        .achievement-header-left { display: flex; align-items: center; gap: 8px; font-size: 16px; font-weight: 600; }
        .refresh-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 6px 14px; border-radius: 6px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 4px; }
        .refresh-btn:hover { background: rgba(255,255,255,0.35); }
        .achievement-body { padding: 16px 20px; }
        .achievement-empty { text-align: center; color: #999; font-size: 14px; padding: 20px 0; }
        .achievement-group-card { border: 1px solid #e0e0e0; border-radius: 10px; margin-bottom: 14px; overflow: hidden; }
        .achievement-group-header { padding: 10px 14px; font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 8px; }
        .achievement-group-body { padding: 12px 14px; background: #fafafa; }
        .achievement-field { margin-bottom: 10px; }
        .achievement-field-label { font-size: 12px; color: #888; margin-bottom: 3px; }
        .achievement-field-value { font-size: 14px; color: #333; line-height: 1.6; }
        .achievement-images { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
        .achievement-images img { width: 80px; height: 80px; object-fit: cover; border-radius: 6px; border: 1px solid #e0e0e0; cursor: pointer; }
        .achievement-time { font-size: 12px; color: #aaa; margin-top: 8px; }

        .section-header { background: #f5f5f5; padding: 12px 20px; font-size: 15px; font-weight: 600; color: #333; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #eee; }
        .section-body { padding: 16px 20px; }

        .bottom-actions { background: white; border-top: 1px solid #eee; padding: 8px 12px; display: flex; gap: 6px; position: fixed; bottom: 0; left: 0; right: 0; z-index: 50; box-shadow: 0 -2px 8px rgba(0,0,0,0.05); flex-wrap: wrap; }
        .action-btn { display: flex; align-items: center; justify-content: center; gap: 4px; padding: 8px 10px; border: none; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 500; white-space: nowrap; }
        .action-btn.present { background: linear-gradient(135deg, #ff9800, #f57c00); color: white; }
        .action-btn.all-present { background: linear-gradient(135deg, #42a5f5, #1e88e5); color: white; }
        .action-btn.submit { background: linear-gradient(135deg, #66bb6a, #43a047); color: white; }
        .action-btn.refresh { background: #f5f5f5; color: #666; border: 1px solid #ddd; }
        .action-btn.clear-group { background: #fff3e0; color: #e65100; border: 1px solid #ffcc80; padding: 6px 8px; font-size: 11px; }
        .action-btn.clear-all { background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; padding: 6px 8px; font-size: 11px; }
        .action-btn.clear-group:hover { background: #ffe0b2; }
        .action-btn.clear-all:hover { background: #ffcdd2; }

        /* ============ 展示模式 ============ */
        .pres-overlay { display: none; position: fixed; inset: 0; z-index: 400; background: #111; color: white; flex-direction: column; }
        .pres-overlay.active { display: flex; }

        /* 顶部控制栏 — 固定可见，大号按钮 */
        .pres-toolbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 16px; background: rgba(0,0,0,0.8); flex-shrink: 0;
            border-bottom: 1px solid rgba(255,255,255,0.15);
            min-height: 50px;
        }
        .pres-toolbar-left { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .pres-toolbar-right { display: flex; align-items: center; gap: 6px; }
        .pres-toolbar button {
            background: rgba(255,255,255,0.18); border: none; color: white;
            padding: 8px 16px; border-radius: 8px; font-size: 14px; cursor: pointer;
            white-space: nowrap; font-weight: 500;
        }
        .pres-toolbar button:hover { background: rgba(255,255,255,0.3); }
        .pres-toolbar button.active-tool { background: #7c4dff; }
        .pres-toolbar select {
            padding: 6px 10px; border-radius: 6px; background: rgba(255,255,255,0.18);
            color: white; border: 1px solid rgba(255,255,255,0.3); font-size: 13px;
            outline: none; cursor: pointer; max-width: 180px;
        }
        .pres-toolbar select option { background: #333; color: white; }
        .pres-counter { font-size: 13px; color: rgba(255,255,255,0.6); margin: 0 4px; }

        /* 画笔工具栏 */
        .pres-draw-bar {
            display: none; align-items: center; gap: 6px;
            padding: 6px 16px; background: rgba(0,0,0,0.6); flex-shrink: 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .pres-draw-bar.active { display: flex; }
        .pres-draw-bar button {
            background: rgba(255,255,255,0.15); border: none; color: white;
            padding: 6px 12px; border-radius: 6px; font-size: 13px; cursor: pointer;
        }
        .pres-draw-bar button:hover { background: rgba(255,255,255,0.3); }
        .pres-draw-bar button.active-tool { background: #ff9800; }
        .pres-draw-bar .color-dot {
            width: 22px; height: 22px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.3);
            cursor: pointer; display: inline-block;
        }
        .pres-draw-bar .color-dot.active { border-color: white; transform: scale(1.2); }
        .pres-draw-bar .size-slider { width: 80px; }

        /* 展示主体 */
        .pres-main { flex: 1; display: flex; overflow: hidden; }
        .pres-left { flex: 1; display: flex; flex-direction: column; background: #0a0a0a; position: relative; min-width: 0; }
        .pres-img-wrap { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .pres-img-wrap img { max-width: 95%; max-height: 95%; object-fit: contain; transition: transform 0.2s; }
        .pres-img-wrap canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .pres-img-wrap canvas.drawing { pointer-events: auto; cursor: crosshair; }
        .pres-img-nav { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 10px; background: rgba(0,0,0,0.5); flex-shrink: 0; flex-wrap: wrap; }
        .pres-img-nav button { background: rgba(255,255,255,0.15); border: none; color: white; padding: 8px 16px; border-radius: 6px; font-size: 16px; cursor: pointer; }
        .pres-img-nav button:hover { background: rgba(255,255,255,0.3); }
        .pres-img-nav .pres-zoom-btn { font-size: 14px; padding: 6px 12px; }
        .pres-img-counter { font-size: 14px; color: rgba(255,255,255,0.7); min-width: 60px; text-align: center; }
        .pres-no-img { color: rgba(255,255,255,0.3); font-size: 18px; text-align: center; padding: 40px; }
        .pres-right { width: 38%; max-width: 420px; min-width: 260px; background: linear-gradient(135deg, #1a237e, #283593); overflow-y: auto; padding: 24px 20px; }
        .pres-group-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.1); border-radius: 8px; padding: 8px 14px; margin-bottom: 16px; font-size: 18px; font-weight: 700; }
        .pres-text-field { margin-bottom: 18px; }
        .pres-text-label { font-size: 15px; color: rgba(255,255,255,0.55); margin-bottom: 6px; letter-spacing: 1.5px; font-weight: 600; }
        .pres-text-value { font-size: 22px; line-height: 1.8; color: rgba(255,255,255,0.98); font-weight: 500; }

        /* Image Viewer */
        .image-viewer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 300; flex-direction: column; }
        .image-viewer-overlay.active { display: flex; }
        .viewer-toolbar { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; background: rgba(0,0,0,0.5); color: white; }
        .viewer-nav { display: flex; align-items: center; gap: 16px; }
        .viewer-nav button { background: none; border: none; color: white; font-size: 18px; cursor: pointer; padding: 4px 8px; }
        .viewer-tools { display: flex; align-items: center; gap: 10px; }
        .viewer-tools button { background: none; border: none; color: white; font-size: 15px; cursor: pointer; padding: 5px 8px; border-radius: 4px; }
        .viewer-tools button:hover { background: rgba(255,255,255,0.2); }
        .viewer-body { flex: 1; display: flex; align-items: center; justify-content: center; }
        .viewer-body img { max-width: 90%; max-height: 90%; object-fit: contain; transition: transform 0.2s; }

        /* ========== 图片库弹窗 ========== */
        .image-library-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 600; flex-direction: column; }
        .image-library-overlay.active { display: flex; }
        .il-box { background: white; border-radius: 20px 20px 0 0; max-width: 600px; width: 100%; margin: auto auto 0; max-height: 85vh; display: flex; flex-direction: column; box-shadow: 0 -8px 40px rgba(0,0,0,0.3); animation: gsSlideUp 0.35s ease-out; }
        @media (min-width: 768px) { .il-box { border-radius: 20px; margin: auto; max-height: 80vh; } }
        .il-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid #eee; flex-shrink: 0; }
        .il-header h3 { font-size: 17px; color: #1a237e; display: flex; align-items: center; gap: 8px; }
        .il-close { background: none; border: none; font-size: 24px; color: #999; cursor: pointer; padding: 4px 8px; }
        .il-close:hover { color: #333; }
        .il-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 16px; overflow-y: auto; flex: 1; }
        @media (min-width: 500px) { .il-grid { grid-template-columns: repeat(4, 1fr); } }

</head>
<body>

<script>
const GROUPS = {
    terrain: { id:'terrain', name:'地形组', icon:'🏔️', gradient:'linear-gradient(135deg,#795548,#8d6e63)', color:'#795548', keyword:'西伯利亚 地形',
        task1:{ title:'从课本图册中找到地形相关图片，拍照上传', featureLabel:'地形特征归纳', featurePH:'' },
        task2:{ westTitle:'🔵 俄罗斯西部', westPH:'', eastTitle:'🔴 俄罗斯东部', eastPH:'', conclusionPH:'' },
        analysisGuide:{ cls:'terrain', title:'🏔️ 分析地形特征的一般方法', steps:[
            '先找出主要的<strong>地形区</strong>，分析地形类型有<strong>多少种</strong>，是<strong>多样还是单一</strong>',
            '判断<strong>以什么地形为主</strong>（平原/高原/山地/盆地…）',
            '看这些地形的<strong>分布特征</strong>，根据分布判断<strong>地势高低</strong>——哪边高、哪边低',
            '最后分析<strong>地势起伏的大小</strong>（起伏大/小？）'
        ]}
    },
    climate: { id:'climate', name:'气候组', icon:'🌡️', gradient:'linear-gradient(135deg,#e65100,#ff6d00)', color:'#e65100', keyword:'西伯利亚 气候 寒冷 冻土',
        task1:{ title:'从课本图册中找到气候相关图片，拍照上传', featureLabel:'气候特征归纳', featurePH:'' },
        task2:{ westTitle:'🔵 俄罗斯西部', westPH:'', eastTitle:'🔴 俄罗斯东部', eastPH:'', conclusionPH:'' },
        analysisGuide:{ cls:'climate', title:'🌡️ 分析气候特征的一般方法', steps:[
            '看图中有<strong>多少种气候类型</strong>，分析气候类型是<strong>多样还是单一</strong>',
            '判断<strong>以什么气候类型为主</strong>（温带大陆性/寒带/亚热带…）',
            '分析这些气候在<strong>空间上的分布</strong>（南北差异？东西差异？）',
            '总体概括区域气候<strong>主要特征</strong>——寒冷还是温暖？干燥还是湿润？'
        ]}
    },
    river: { id:'river', name:'河湖组', icon:'🌊', gradient:'linear-gradient(135deg,#1565c0,#1976d2)', color:'#1565c0', keyword:'西伯利亚 河湖 鄂毕河 叶尼塞河 勒拿河',
        task1:{ title:'从课本图册中找到河湖相关图片，拍照上传', featureLabel:'河湖特征归纳', featurePH:'' },
        task2:{ westTitle:'🔵 俄罗斯西部', westPH:'', eastTitle:'🔴 俄罗斯东部', eastPH:'', conclusionPH:'' },
        analysisGuide:{ cls:'river', title:'🌊 分析河湖特征的一般方法', steps:[
            '整体看河流湖泊<strong>数量多少</strong>（多/少），是否<strong>分布均匀</strong>；若不均匀，<strong>哪里集中</strong>',
            '找出几条<strong>代表性河流</strong>（如鄂毕河、叶尼塞河、勒拿河）',
            '分析河流<strong>流程长短</strong>、<strong>流向</strong>、<strong>流速</strong>、<strong>流量及季节变化</strong>、<strong>结冰期</strong>（长短？有无？）',
            '分析河流<strong>航运价值</strong>（高/低？说明原因）'
        ]}
    },
};

let currentGroup=null, currentGroupNum=1, uploadedImages=[], imageUrls=[];
let viewerImages=[], viewerIndex=0, zoomLevel=1;
let serverMode=false, cachedResults={}, sessionResults={};
let presGroups=[], presGroupIdx=0, presImgIdx=0, presZoom=1;
let selectedGroup=null;
// imageUrls[i] 存储已上传到服务器的URL，与 uploadedImages 一一对应
// uploadedImages[i] 用于本地显示（base64或服务器URL），imageUrls[i] 用于提交给服务器
// 画笔状态
let presDrawing=false, drawTool='pen', drawColor='#ff0000', drawSize=3;
let isDrawing=false, lastX=0, lastY=0;

// ============ 版本刷新（自动清除浏览器缓存）============
(function(){const v='240607A';if(localStorage.getItem('_app_ver')!==v){localStorage.setItem('_app_ver',v);location.reload(true);}})();

// ============ 初始化 ============
window.addEventListener('DOMContentLoaded',()=>{
    renderGroupSelection();
    detectServer();
    const s=localStorage.getItem('selectedGroup');
    if(s)try{
        const d=JSON.parse(s);
        if(d.group){
            selectGroup(d.group);
            document.getElementById('groupNumber').value=d.num||1;
            // ★ 只在从必应返回（localStorage有标记且1小时内）时才自动恢复课堂
            const _bingFlag=localStorage.getItem('_bingReturn');
            const _bingTime=parseInt(localStorage.getItem('_bingReturnTime')||'0');
            const _bingValid=_bingFlag==='1' && (Date.now()-_bingTime)<3600000;
            if(d.entered===true && _bingValid){
                localStorage.removeItem('_bingReturn');
                localStorage.removeItem('_bingReturnTime');
                currentGroup=d.group;
                currentGroupNum=d.num||1;
                document.getElementById('groupSelectOverlay').classList.add('hidden');
                const fb=document.getElementById('floatingBackBtn');if(fb)fb.style.display='flex';
                renderMainApp();
                restoreDraft();
                updateServerStatus();
                return;
            }
        }
    }catch(e){}
    // ★ 正常情况（扫码等）：始终显示干净的小组选择界面
    document.getElementById('groupSelectOverlay').classList.remove('hidden');
});

// 离开页面时自动保存草稿
window.addEventListener('beforeunload',()=>{if(currentGroup)saveDraft();});
// 切换标签页时自动保存
window.addEventListener('visibilitychange',()=>{if(document.hidden&&currentGroup)saveDraft();});
function detectServer(){
    // 只要不是本地文件打开，就判定为公网模式（不再 fetch 验证，避免 Render 冷启动超时误判）
    serverMode = window.location.protocol !== 'file:' && window.location.hostname !== '';
    if(currentGroup)updateServerStatus();
}

function updateServerStatus(){
    const sub=document.getElementById('headerSubtitle');
    if(!sub)return;
    const base=`${GROUPS[currentGroup]?.icon||''} ${GROUPS[currentGroup]?.name||''} · 第${currentGroupNum}小组`;
    if(serverMode){
        sub.innerHTML=base+` <span style="color:#69f0ae;font-size:11px;">● 公网已连接</span>`;
    }else{
        sub.innerHTML=base+` <span style="color:#ff5252;font-size:11px;">○ 等待连接...</span>`;
    }
}

// ============ 小组选择 ============
function renderGroupSelection(){
    document.getElementById('groupGrid').innerHTML=Object.entries(GROUPS).map(([k,g])=>`<div class="group-select-btn" data-group="${k}" onclick="selectGroup('${k}')" style="--gs-color:${g.color};--gs-bg:${g.color}10;--gs-ring:${g.color}20;"><span class="gs-icon">${g.icon}</span><span class="gs-name">${g.name}</span><span class="gs-hint">${g.keyword.split(' ')[0]}</span></div>`).join('');
}
function selectGroup(k){
    selectedGroup=k;
    document.querySelectorAll('.group-select-btn').forEach(b=>{
        const isSel=b.dataset.group===k;
        b.setAttribute('data-selected',isSel?'true':'false');
    });
    updateEnterBtn();
}
function updateEnterBtn(){document.getElementById('enterBtn').disabled=!selectedGroup||!document.getElementById('groupNumber').value;}
document.getElementById('groupNumber').addEventListener('input',updateEnterBtn);
function enterApp(){
    if(!selectedGroup)return;
    const prevGroup=currentGroup, prevNum=currentGroupNum;
    currentGroup=selectedGroup;
    currentGroupNum=parseInt(document.getElementById('groupNumber').value)||1;
    localStorage.setItem('selectedGroup',JSON.stringify({group:currentGroup,num:currentGroupNum,entered:true}));
    document.getElementById('groupSelectOverlay').classList.add('hidden');
    const fb=document.getElementById('floatingBackBtn');if(fb)fb.style.display='flex';
    // ★ 只有切换到不同小组时才清空图片
    if(currentGroup!==prevGroup||currentGroupNum!==prevNum){
        uploadedImages=[];imageUrls=[];
    }
    renderMainApp();
    // ★ 加载草稿（会恢复之前填的内容和图片）
    restoreDraft();
    updateServerStatus();
}
function switchGroup(){document.getElementById('groupSelectOverlay').classList.remove('hidden');const fb=document.getElementById('floatingBackBtn');if(fb)fb.style.display='none';}
function resumeClass(){const s=localStorage.getItem('selectedGroup');if(!s)return;try{const d=JSON.parse(s);if(d.group){currentGroup=d.group;currentGroupNum=d.num||1;document.getElementById('groupSelectOverlay').classList.add('hidden');const fb=document.getElementById('floatingBackBtn');if(fb)fb.style.display='flex';renderMainApp();restoreDraft();updateServerStatus();showNotification('✅ 已返回课堂');window.scrollTo({top:0,behavior:'smooth'});}}catch(e){}}

// ============ 渲染主界面 ============
function renderMainApp(){
    const g=GROUPS[currentGroup];
    document.getElementById('headerSubtitle').textContent=`${g.icon} ${g.name} · 第${currentGroupNum}小组`;
    const guide=g.analysisGuide?`<div class="analysis-guide ${g.analysisGuide.cls}"><div class="ag-title">${g.analysisGuide.title}</div><ol class="ag-steps">${g.analysisGuide.steps.map(s=>`<li>${s}</li>`).join('')}</ol><div class="ag-note">💡 按以上步骤思考，再填写下方任务</div></div>`:'';
    document.getElementById('groupCardContainer').innerHTML=`
    <div class="group-card"><div class="group-header" style="background:${g.gradient}"><span class="group-icon">${g.icon}</span><span class="group-name">${g.name} · 第${currentGroupNum}小组</span></div><div class="group-body">
        ${guide}
        <div class="task-section"><div class="task-title"><span class="emoji">📸</span>任务一：${g.task1.title}</div>
            <div class="upload-area" id="uploadArea" onclick="triggerUpload()"><div class="upload-icon">📤</div><div class="upload-text">点击此处上传图片</div></div>
            <input type="file" id="fileInput" accept="image/*" multiple style="display:none" onchange="handleFileUpload(event)">
            <div class="upload-buttons"><button class="upload-btn" onclick="openCamera()"><span class="btn-icon">📷</span>拍照上传</button><button class="upload-btn" onclick="triggerUpload()"><span class="btn-icon">🖼️</span>从相册选择</button><button class="upload-btn" onclick="openImageLibrary()"><span class="btn-icon">📚</span>图片库</button><button class="upload-btn" onclick="searchImages()" style="border-color:#42a5f5;color:#1565c0;"><span class="btn-icon">🔍</span>搜索Bing图片</button></div>
        </div>
        <div class="task-section"><div class="task-title"><span class="emoji">📝</span>根据上传的图片，归纳特征并回答：</div>
            <div class="answer-area"><div class="answer-label">${g.task1.featureLabel}：</div><textarea class="answer-textarea" id="featureAnswer" placeholder="${g.task1.featurePH}" oninput="autoSaveDraft()"></textarea></div>
        </div>
        <div class="task-section"><div class="task-title"><span class="emoji">🚂</span>任务二：分析该因素对西伯利亚大铁路建设的影响</div>
            <div class="tip-box"><div class="tip-label">💡 提示：可以分别从俄罗斯<strong>西部</strong>和<strong>东部</strong>两个区域进行分析</div></div>
            <div class="region-analysis"><div class="region-card west"><div class="region-label">${g.task2.westTitle}</div><textarea class="answer-textarea" id="westAnswer" placeholder="${g.task2.westPH}" oninput="autoSaveDraft()"></textarea></div><div class="region-card east"><div class="region-label">${g.task2.eastTitle}</div><textarea class="answer-textarea" id="eastAnswer" placeholder="${g.task2.eastPH}" oninput="autoSaveDraft()"></textarea></div></div>
            <div class="conclusion-section"><div class="conclusion-label">📋 综合结论</div><textarea class="answer-textarea" id="conclusionAnswer" placeholder="${g.task2.conclusionPH}" oninput="autoSaveDraft()"></textarea></div>
        </div>
    </div></div>`;
    refreshWall(); loadDraft();
}

// ============ 图片上传 ============
function triggerUpload(){document.getElementById('fileInput').click();}
function openCamera(){const i=document.createElement('input');i.type='file';i.accept='image/*';i.capture='environment';i.multiple=true;i.onchange=handleFileUpload;i.click();}

async function handleFileUpload(e){
    const files=e.target.files;if(!files||!files.length)return;
    const n=files.length;
    showNotification(`⏳ 正在上传 ${n} 张图片...`);

    for(const f of files){
        // 1. 先转base64，用于本地即时显示
        const b64=await fileToBase64(f);
        const idx=uploadedImages.length;
        uploadedImages.push(b64);
        imageUrls.push(''); // 占位，等待服务器返回

        // 2. 尝试上传到服务器
        if(serverMode){
            try{
                const fd=new FormData();fd.append('image',f);
                const r=await fetch('/api/upload_image',{method:'POST',body:fd});
                const d=await r.json();
                if(d.url){
                    // 上传成功：imageUrls存服务器URL，uploadedImages用服务器URL（其他设备也能访问）
                    imageUrls[idx]=d.url;
                    uploadedImages[idx]=d.url;
                }
            }catch(err){
                console.log('图片上传服务器失败，保留base64:',err);
            }
        }
    }

    updateUploadArea();
    saveDraft();
    showNotification(`✅ 已添加 ${n} 张图片到图册！`);
    e.target.value='';
}

function fileToBase64(f){return new Promise(r=>{const rd=new FileReader();rd.onload=e=>r(e.target.result);rd.readAsDataURL(f);});}

let libraryImages=[], selectedLibraryIdx=[];

async function openImageLibrary(readOnly){
    // 记录是否只读模式（教师从展示模式查看图片库）
    window._ilReadOnly = !!readOnly;
    document.getElementById('imageLibraryOverlay').classList.add('active');

    const instr = document.getElementById('ilInstruction');
    const footer = document.getElementById('ilFooter');
    if(window._ilReadOnly){
        if(instr){ instr.style.display = 'none'; }
        if(footer){ footer.style.display = 'none'; }
        document.getElementById('imageLibraryOverlay').classList.add('readonly');
    } else {
        if(instr){ instr.style.display = ''; }
        if(footer){ footer.style.display = ''; }
        document.getElementById('imageLibraryOverlay').classList.remove('readonly');
    }
    document.getElementById('ilGrid').innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:#999;">⏳ 加载中...</div>';
    selectedLibraryIdx=[];
    updateIlCount();

        const r=await fetch('/api/image_library');

        libraryImages=d.images||[];
        renderImageLibrary();
    }catch(e){
        document.getElementById('ilGrid').innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:#c62828;">❌ 加载失败，请检查网络</div>';
    }
}
function closeImageLibrary(){
    document.getElementById('imageLibraryOverlay').classList.remove('active');
    document.getElementById('imageLibraryOverlay').classList.remove('readonly');
    // 只读模式：关闭后展示模式继续（展示界面在底层正常运行）
    if(window._ilReadOnly){
        window._ilReadOnly = false;
        return;
    }
}
function renderImageLibrary(){
    const grid=document.getElementById('ilGrid');
    if(!libraryImages.length){grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:#999;">📭 图片库为空</div>';return;}
    grid.innerHTML=libraryImages.map((img,i)=>{
        const sel=selectedLibraryIdx.includes(i);
        return `<div class="il-item${sel?' selected':''}" onclick="toggleLibraryImage(${i})">
            <img src="${img.url}" alt="${img.name}" loading="lazy" onerror="this.parentElement.style.display='none'">
            <div class="il-check">✓</div>
            <div class="il-name">${img.name}</div>
        </div>`;
    }).join('');
}
function toggleLibraryImage(idx){
    if(window._ilReadOnly) return; // 只读模式不允许选中
    const pos=selectedLibraryIdx.indexOf(idx);
    if(pos>=0)selectedLibraryIdx.splice(pos,1);
    else selectedLibraryIdx.push(idx);
    updateIlCount();
    renderImageLibrary();
}
function updateIlCount(){
    document.getElementById('ilCount').textContent=`已选 ${selectedLibraryIdx.length} 张`;
    document.getElementById('ilConfirmBtn').disabled=selectedLibraryIdx.length===0;
}
async function confirmImageLibrary(){
    if(!selectedLibraryIdx.length)return;
    const n=selectedLibraryIdx.length;
    showNotification(`⏳ 正在添加 ${n} 张图片...`);
    let added=0;
    for(const idx of selectedLibraryIdx){
        const img=libraryImages[idx];
        if(!img)continue;
        try{
            // 尝试 fetch 图片并转 base64（确保跨设备也能看）
            const resp=await fetch(img.url);
            const blob=await resp.blob();
            const b64=await new Promise(r=>{const rd=new FileReader();rd.onload=e=>r(e.target.result);rd.readAsDataURL(blob);});
            uploadedImages.push(b64);
            imageUrls.push(img.url);
            added++;
        }catch(e){
            // 降级：直接用服务器URL
            uploadedImages.push(img.url);
            imageUrls.push(img.url);
            added++;
        }
    }
    updateUploadArea();
    saveDraft();
    closeImageLibrary();
    showNotification(`✅ 已从图片库添加 ${added} 张图片！`);
}

// ============ 成果提交 ============
function collectData(){
    const g=GROUPS[currentGroup];
    // 关键：images字段优先使用服务器URL（其他设备可访问），降级使用base64
    const imagesForSubmit=uploadedImages.map((img,i)=>{
        if(imageUrls[i])return imageUrls[i]; // 有服务器URL就用URL
        if(img.startsWith('/uploads/')||img.startsWith('http'))return img; // 已经是URL
        return img; // 降级：用base64（服务器端会自动转换为文件）
    }).filter(img=>img&&img.length>0); // ★ 过滤掉空图片，防止未上传时混入脏数据
    return{
        group_id:`${currentGroup}_${currentGroupNum}`,
        group_key:currentGroup,
        group_name:g.name,
        group_icon:g.icon,
        group_num:currentGroupNum,
        feature:document.getElementById('featureAnswer')?.value||'',
        west:document.getElementById('westAnswer')?.value||'',
        east:document.getElementById('eastAnswer')?.value||'',
        conclusion:document.getElementById('conclusionAnswer')?.value||'',
        images:imagesForSubmit
    };
}

async function submitResult(){
    const data=collectData();
    const has=data.feature||data.west||data.east||data.conclusion||data.images.length>0;
    if(!has){showNotification('请先完成任务内容再提交');return;}
    if(!confirm('确认提交成果？提交后其他同学刷新即可看到'))return;

    showNotification('⏳ 正在提交成果...');

    // 1. 本地内存存储（100%可靠）
    const t=new Date().toLocaleString('zh-CN');
    const full={...data,submit_time:t};
    sessionResults[data.group_id]=full;

    // 2. localStorage降级存储
    try{
        const a=JSON.parse(localStorage.getItem('classResults')||'{}');
        a[data.group_id]=full;
        localStorage.setItem('classResults',JSON.stringify(a));
    }catch(e){}

    // 3. 提交到服务器（最关键：跨设备共享）
    let serverOk=false;
    if(serverMode){
        try{
            const r=await fetch('/api/submit',{
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify(data)
            });
            const d=await r.json();
            if(d.status==='ok'){
                serverOk=true;
                // 提交成功后，把服务器返回的图片URL更新到本地
                if(d.image_urls){
                    for(let i=0;i<d.image_urls.length&&i<uploadedImages.length;i++){
                        if(d.image_urls[i]){
                            imageUrls[i]=d.image_urls[i];
                            uploadedImages[i]=d.image_urls[i];
                        }
                    }
                }
            }else{
                console.log('服务器返回错误:',d.error);
            }
        }catch(err){
            console.log('提交到服务器失败:',err);
        }
    }

    if(serverOk){
        showNotification('✅ 成果已提交到服务器！其他同学刷新即可看到');
    }else if(serverMode){
        showNotification('⚠️ 服务器提交失败，成果仅本机可见');
    }else{
        showNotification('✅ 成果已保存（未连接服务器，仅本机可见）');
    }

    saveDraft();
    await refreshWall();
}

// ============ 成果墙 ============
async function refreshWall(){
    const body=document.getElementById('achievementBody');
    // 显示正在加载
    if(body)body.innerHTML='<div class="achievement-empty">⏳ 正在刷新成果...</div>';

    let results={};
    let serverReachable=false;

    // 1. 优先从服务器获取（跨设备共享的关键）
    if(serverMode){
        try{
            const r=await fetch('/api/results?_t='+Date.now(),{signal:AbortSignal.timeout(5000)});
            if(r.ok){
                results=await r.json();
                serverReachable=true;
            }
        }catch(e){
            console.log('获取服务器成果失败:',e);
        }
    }

    // 2&3. 仅在不连服务器时用本地数据补充（避免服务器清空后本地旧数据覆盖）
    if(!serverMode){
        for(const k in sessionResults)results[k]=sessionResults[k];
        try{
            const l=JSON.parse(localStorage.getItem('classResults')||'{}');
            for(const k in l)if(!results[k])results[k]=l[k];
        }catch(e){}
    }

    cachedResults=results;
    renderAchievementWall(results);

    // 更新服务器状态提示
    if(!serverReachable && serverMode){
        showNotification('⚠️ 无法连接服务器，显示的是本地缓存成果');
        serverMode=false; // 标记为不可用
        updateServerStatus();
    }
}

        return`<div class="achievement-group-card"><div class="achievement-group-header" style="background:${g.color}15;color:${g.color};">${g.icon} ${r.group_name||g.name} · 第${r.group_num||'?'}小组</div><div class="achievement-group-body">

            ${r.west?`<div class="achievement-field"><div class="achievement-field-label">🔹 西部分析</div><div class="achievement-field-value">${r.west}</div></div>`:''}
            ${r.east?`<div class="achievement-field"><div class="achievement-field-label">🔸 东部分析</div><div class="achievement-field-value">${r.east}</div></div>`:''}
            ${r.conclusion?`<div class="achievement-field"><div class="achievement-field-label">📋 综合结论</div><div class="achievement-field-value">${r.conclusion}</div></div>`:''}
            ${imgs}${r.submit_time?`<div class="achievement-time">提交时间：${r.submit_time}</div>`:''}</div></div>`;

function initPresCanvas(){

    const ctx=canvas.getContext('2d');ctx.clearRect(0,0,canvas.width,canvas.height);
}

// ============ 展示画笔功能 ============
// 绑定/重建 Canvas 画笔事件（每次 Canvas 被重建后都要调用）
function bindPresCanvasEvents(){
    const canvas=document.getElementById('presCanvas');
    if(!canvas||canvas._listenersBound)return; // 避免重复绑定
    canvas._listenersBound=true;

    function getPos(e){
        const r=canvas.getBoundingClientRect();
        const t=e.touches?e.touches[0]:e;
        return{x:t.clientX-r.left,y:t.clientY-r.top};
    }
    function startDraw(e){if(!presDrawing)return;isDrawing=true;const p=getPos(e);lastX=p.x;lastY=p.y;e.preventDefault();}
    function draw(e){
        if(!isDrawing||!presDrawing)return;e.preventDefault();
        const p=getPos(e);const ctx=canvas.getContext('2d');
        ctx.beginPath();ctx.moveTo(lastX,lastY);ctx.lineTo(p.x,p.y);
        if(drawTool==='eraser'){ctx.globalCompositeOperation='destination-out';ctx.lineWidth=drawSize*4;}
        else if(drawTool==='highlight'){ctx.globalCompositeOperation='source-over';ctx.strokeStyle=drawColor+'80';ctx.lineWidth=drawSize*4;}
        else{ctx.globalCompositeOperation='source-over';ctx.strokeStyle=drawColor;ctx.lineWidth=drawSize;}
        ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();
        lastX=p.x;lastY=p.y;
    }
    function endDraw(){isDrawing=false;const ctx=canvas.getContext('2d');ctx.globalCompositeOperation='source-over';}

    canvas.addEventListener('mousedown',startDraw);
    canvas.addEventListener('mousemove',draw);
    canvas.addEventListener('mouseup',endDraw);
    canvas.addEventListener('mouseleave',endDraw);
    canvas.addEventListener('touchstart',startDraw,{passive:false});
    canvas.addEventListener('touchmove',draw,{passive:false});
    canvas.addEventListener('touchend',endDraw);
}

function togglePresDraw(){
    presDrawing=!presDrawing;
    const canvas=document.getElementById('presCanvas');
    const bar=document.getElementById('presDrawBar');
    const btn=document.getElementById('presDrawToggle');
    if(presDrawing){
        initPresCanvas();          // 先初始化画布（会清掉 drawing 类，没关系）
        canvas.classList.add('drawing');   // 再加回来
        bar.classList.add('active');btn.classList.add('active-tool');
        bindPresCanvasEvents(); // 绑定/重建画笔事件
    }else{
        canvas.classList.remove('drawing');bar.classList.remove('active');btn.classList.remove('active-tool');
    }
}

function setDrawTool(tool){drawTool=tool;document.querySelectorAll('.pres-draw-bar button[data-tool]').forEach(b=>{b.classList.toggle('active-tool',b.dataset.tool===tool);});}
function setDrawColor(c){drawColor=c;document.querySelectorAll('.pres-draw-bar .color-dot').forEach(d=>{d.classList.toggle('active',d.style.background===c);});}
function clearPresDrawing(){const canvas=document.getElementById('presCanvas');if(!canvas)return;const ctx=canvas.getContext('2d');ctx.clearRect(0,0,canvas.width,canvas.height);}

// 展示导航
function presImgPrev(){const g=presGroups[presGroupIdx];if(!g||!g.images||!g.images.length)return;if(presImgIdx>0){presImgIdx--;presZoom=1;renderPresImage();}}
function presImgNext(){const g=presGroups[presGroupIdx];if(!g||!g.images||!g.images.length)return;if(presImgIdx<g.images.length-1){presImgIdx++;presZoom=1;renderPresImage();}}
function presZoomIn(){presZoom+=0.25;if(presZoom>5)presZoom=5;const img=document.getElementById('presImage');if(img)img.style.transform=`scale(${presZoom})`;}
function presZoomOut(){if(presZoom>0.25){presZoom-=0.25;const img=document.getElementById('presImage');if(img)img.style.transform=`scale(${presZoom})`;}}
function presZoomReset(){presZoom=1;const img=document.getElementById('presImage');if(img)img.style.transform='scale(1)';}
// 鼠标滚轮缩放
function presWheelZoom(e){
    e.preventDefault();
    const delta=e.deltaY>0?-0.15:0.15;
    presZoom=Math.max(0.25,Math.min(5,presZoom+delta));
    const img=document.getElementById('presImage');
    if(img)img.style.transform=`scale(${presZoom})`;
}
window._presWheelBound=false;
function bindPresWheel(){
    if(window._presWheelBound)return;
    window._presWheelBound=true;
    const wrap=document.getElementById('presImgWrap');
    if(wrap)wrap.addEventListener('wheel',presWheelZoom,{passive:false});
}
function presGroupPrev(){if(presGroupIdx>0){presGroupIdx--;presImgIdx=0;presZoom=1;renderPresSlide();}}
function presGroupNext(){if(presGroupIdx<presGroups.length-1){presGroupIdx++;presImgIdx=0;presZoom=1;renderPresSlide();}}
function presJumpToGroup(idx){idx=parseInt(idx);if(idx>=0&&idx<presGroups.length){presGroupIdx=idx;presImgIdx=0;presZoom=1;renderPresSlide();}}
function closePresentation(){document.getElementById('presOverlay').classList.remove('active');presDrawing=false;try{document.exitFullscreen?.();}catch(e){}}
function presViewImages(){
    // ★ 只读查看图片库：不关闭展示模式，图片库弹窗覆盖在上方
    // 关闭图片库后展示继续，不影响展示顺序和内容
    openImageLibrary(true);
}

// ============ 草稿 ============
function scrollToTop(){window.scrollTo({top:0,behavior:'smooth'});}
let _saveTimer=null;
function autoSaveDraft(){if(_saveTimer)clearTimeout(_saveTimer);_saveTimer=setTimeout(()=>{saveDraft();},800);}
function saveDraft(){if(!currentGroup)return;try{const d=collectData();d.imageUrls=imageUrls.slice();localStorage.setItem(`draft_${currentGroup}_${currentGroupNum}`,JSON.stringify(d));}catch(e){}}
function loadDraft(){try{const data=JSON.parse(localStorage.getItem(`draft_${currentGroup}_${currentGroupNum}`)||'null');if(!data)return false;if(data.feature)document.getElementById('featureAnswer').value=data.feature;if(data.west)document.getElementById('westAnswer').value=data.west;if(data.east)document.getElementById('eastAnswer').value=data.east;if(data.conclusion)document.getElementById('conclusionAnswer').value=data.conclusion;if(data.images&&data.images.length){uploadedImages=data.images;updateUploadArea();}if(data.imageUrls&&data.imageUrls.length){imageUrls=data.imageUrls;}return true;}catch(e){return false;}}
function restoreDraft(){const ok=loadDraft();if(ok)showNotification('✅ 已恢复上次编辑的内容');}
setInterval(()=>{if(currentGroup)saveDraft();},30000);

// ============ 工具 ============
function closeApp(){if(!confirm('确定要退出吗？'))return;const s=localStorage.getItem('selectedGroup');if(s)try{const d=JSON.parse(s);d.entered=false;localStorage.setItem('selectedGroup',JSON.stringify(d));}catch(e){}document.getElementById('groupSelectOverlay').classList.remove('hidden');const fb=document.getElementById('floatingBackBtn');if(fb)fb.style.display='none';showNotification('已退出课堂');}
function showNotification(msg){const o=document.querySelector('.ntoast');if(o)o.remove();const t=document.createElement('div');t.className='ntoast';t.textContent=msg;t.style.cssText='position:fixed;top:70px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);color:white;padding:10px 24px;border-radius:24px;font-size:14px;z-index:1000;max-width:90%;text-align:center;animation:fadeIn 0.3s ease-out;';document.body.appendChild(t);setTimeout(()=>t.remove(),3000);}
</script>
